<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shaadi ka Nimantran</title>
<style>
body { margin:0; background:#f8f3f0; font-family:'Georgia'; text-align:center; color:#5a2a2a; }
.envelope { background:#8B4513; height:100vh; display:flex; justify-content:center; align-items:center; cursor:pointer; }
.seal { width:100px; height:100px; background:#f5e6c4; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:2rem; }
.card { display:none; padding:30px; max-width:650px; margin:auto; }
h1 { color:#b8860b; }
.scratch { width:150px; height:80px; background:#c2185b; color:white; margin:10px; display:inline-block; line-height:80px; border-radius:10px; }
.confetti { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; }
</style>
</head>
<body>

<!-- 1. ENVELOPE SCREEN -->
<div class="envelope" onclick="openCard()">
  <div class="seal">R&P</div>
  <p style="color:white; position:absolute; bottom:100px;">Tap to Reveal</p>
</div>

<!-- 2. MAIN INVITE CARD -->
<div class="card" id="mainCard">
  <h1>Meenal & Avinash</h1>
  <p>With the blessings of our families, we invite you</p>
  
  <h2>Save the Date</h2>
  <div>
    <div class="scratch" onclick="this.innerHTML='JULY'">SCRATCH</div>
    <div class="scratch" onclick="this.innerHTML='01'">SCRATCH</div>
    <div class="scratch" onclick="this.innerHTML='2026'">SCRATCH</div>
  </div>

  <h2>Our Story</h2>
  <img src="couple1.jpg" width="90%" style="border-radius:15px; margin:10px 0;">
  <img src="couple2.jpg" width="90%" style="border-radius:15px; margin:10px 0;">

  <h2>The Venue</h2>
  <p>Rajalakshmi Kalyana Mandapam</p>
  <a href="https://maps.google.com" target="_blank">View on Maps</a>

  <h2>RSVP</h2>
  <input placeholder="Your Name"><br><br>
  <input placeholder="Phone"><br><br>
  <button>Joyfully Accept</button>

  <audio autoplay loop>
    <source src="shaadi.mp3" type="audio/mpeg">
  </audio>
</div>

<script>
function openCard(){
  document.querySelector('.envelope').style.display='none';
  document.getElementById('mainCard').style.display='block';
  // Confetti effect
  for(let i=0;i<100;i++){
    let conf = document.createElement('div');
    conf.style = `position:fixed; width:10px; height:10px; background:hsl(${Math.random()*360},100%,50%); top:-10px; left:${Math.random()*100}%; animation:fall 3s linear;`;
    document.body.appendChild(conf);
  }
}
</script>
<style>@keyframes fall { to { transform:translateY(100vh) rotate(720deg); } }</style>
</body>
</html>
