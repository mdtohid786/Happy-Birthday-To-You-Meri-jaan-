<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Royal Invitation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Times New Roman', serif; }
        
        /* 1. Entry Overlay */
        #entry-overlay { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* 2. Scratch/Swipe Effect */
        #scratch-zone { position: relative; width: 300px; height: 150px; background: #1a1a1a; border: 2px solid #d4af37; overflow: hidden; cursor: crosshair; }
        #cover-layer { position: absolute; inset: 0; background: #1a1a1a; display: flex; align-items: center; justify-content: center; transition: opacity 0.8s; }
        
        /* 3. Snap Gallery */
        .gallery-container { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; gap: 1rem; padding: 2rem; }
        .gallery-item { flex: 0 0 80%; scroll-snap-align: center; height: 350px; background: #222; border-radius: 20px; overflow: hidden; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <!-- Overlay -->
    <div id="entry-overlay">
        <h1 class="text-4xl mb-8 animate-pulse text-[#d4af37]">Rahul & Riya</h1>
        <button onclick="startExperience()" class="px-8 py-3 border border-[#d4af37] text-[#d4af37] hover:bg-[#d4af37] hover:text-black transition">TAP TO REVEAL</button>
    </div>

    <!-- Music -->
    <audio id="bgMusic" loop>
        <source src="YOUR_MUSIC_LINK_HERE.mp3" type="audio/mpeg">
    </audio>

    <!-- Header Section -->
    <section class="h-screen flex flex-col items-center justify-center text-center">
        <p class="uppercase tracking-[0.5em] text-xs text-[#d4af37]">Wedding Invitation</p>
        <h1 class="text-7xl mt-4">Rahul <span class="text-[#d4af37]">&</span> Riya</h1>
    </section>

    <!-- Scratch Section -->
    <section class="py-20 flex flex-col items-center">
        <h2 class="text-2xl mb-6">Swipe to reveal the date</h2>
        <div id="scratch-zone" ontouchmove="revealDate()" onmousemove="revealDate()">
            <div id="cover-layer">
                <span class="text-sm uppercase tracking-widest text-gray-500">Scratch Here</span>
            </div>
            <div class="flex items-center justify-center h-full text-center">
                <p class="text-2xl font-bold text-[#d4af37]">November 15, 2026</p>
            </div>
        </div>
    </section>

    <!-- Snap Gallery -->
    <section class="py-10">
        <h2 class="text-center text-3xl mb-8">Memories</h2>
        <div class="gallery-container">
            <!-- 6 Photos -->
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=1" alt="Photo 1"></div>
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=2" alt="Photo 2"></div>
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=3" alt="Photo 3"></div>
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=4" alt="Photo 4"></div>
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=5" alt="Photo 5"></div>
            <div class="gallery-item"><img src="https://picsum.photos/400/600?random=6" alt="Photo 6"></div>
        </div>
    </section>

    <script>
        function startExperience() {
            // Hide Overlay
            document.getElementById('entry-overlay').style.display = 'none';
            // Play Music
            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("User interaction needed for audio"));
        }

        function revealDate() {
            document.getElementById('cover-layer').style.opacity = '0';
        }
    </script>
</body>
</html>
