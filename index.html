<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invifest Premium Custom Clone</title>
    
    <!-- Original Design Core Variables & Structure -->
    <style>
        :root {
            --bg-dark: #070708;
            --premium-gold: #cfa851;
            --text-white: #f3f4f6;
            --card-gray: #121214;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-white); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* 1. Exact Screen Entrance Tap Overlay */
        #invifest-gate {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #111115 0%, #070708 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-center: center;
            padding: 20px;
        }
        .gate-btn {
            background: transparent;
            color: var(--premium-gold);
            border: 1px solid var(--premium-gold);
            padding: 12px 36px;
            font-size: 13px;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 30px;
            transition: all 0.4s ease;
            border-radius: 4px;
        }
        .gate-btn:active {
            background: var(--premium-gold);
            color: #000;
        }

        /* 2. Main Hero Layout */
        .hero-section {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            background: radial-gradient(circle at center, rgba(207,168,81,0.05) 0%, transparent 70%);
        }
        .couple-name {
            font-size: 3.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin: 15px 0;
            color: #ffffff;
        }
        .gold-tag {
            color: var(--premium-gold);
            font-size: 11px;
            letter-spacing: 0.4em;
            text-transform: uppercase;
        }

        /* 3. Original Scratch Component Grid */
        .scratch-wrapper {
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #0b0b0d;
            border-y: 1px solid rgba(255,255,255,0.03);
        }
        .scratch-card-box {
            position: relative;
            width: 310px;
            height: 150px;
            background: var(--card-gray);
            border: 1px solid rgba(207,168,81,0.25);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 20px;
        }
        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 5;
            cursor: pointer;
            touch-action: none;
        }
        .date-hidden-layer {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            z-index: 2;
        }

        /* 4. Original Style Snap App Gallery */
        .gallery-wrapper {
            padding: 60px 0;
        }
        .gallery-rail {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding: 0 30px;
            gap: 20px;
            scroll-behavior: smooth;
        }
        .gallery-rail::-webkit-scrollbar {
            display: none; /* Hide scrollbar completely */
        }
        .gallery-card {
            flex: 0 0 280px;
            scroll-snap-align: center;
            height: 400px;
            border-radius: 16px;
            overflow: hidden;
            background: #16161a;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .gallery-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- 🌟 1. ORIGINAL GATE ENTRY (Tap to Unlock) -->
    <div id="invifest-gate">
        <div class="gold-tag">Wedding Invitation</div>
        <h1 class="couple-name" style="font-size: 2.5rem; margin-top: 10px;">Rahul & Riya</h1>
        <button class="gate-btn" onclick="openInvitation()">Tap To Open</button>
    </div>

    <!-- 🎵 BACKGROUND BACKGROUND MUSIC ENGINE -->
    <!-- EDIT HERE: Apne gaane ka name ya url daalein -->
    <audio id="bg-audio" loop>
        <source src="YOUR_MUSIC_SRC.mp3" type="audio/mpeg">
    </audio>

    <!-- 🏛️ 2. MAIN HERO HOME SCREEN -->
    <section class="hero-section">
        <div class="gold-tag">The Celebration of Love</div>
        <h2 class="couple-name">Rahul & Riya</h2>
        <p style="color: #8a8a93; font-size: 14px; max-width: 280px; line-height: 1.6;">Kindly request the honor of your presence at their wedding ceremony</p>
    </section>

    <!-- 🎫 3. EXACT CLONE SCRATCH MODULE -->
    <section class="scratch-wrapper">
        <div class="gold-tag" style="font-size: 10px;">Save The Date</div>
        <div class="scratch-card-box">
            <!-- Hidden Date Details Inside Server Free Wrapper -->
            <div class="date-hidden-layer">
                <p style="color: var(--premium-gold); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 5px;">Shubh Vivaah</p>
                <h3 style="font-size: 22px; font-weight: 600; letter-spacing: 1px;">NOV 15, 2026</h3>
                <p style="color: #66666e; font-size: 11px; margin-top: 4px;">Join Us to Celebrate</p>
            </div>
            <!-- Canvas Scratch Cover -->
            <canvas id="scratch-canvas" width="310" height="150"></canvas>
        </div>
    </section>

    <!-- 🖼️ 4. 4 OR 6 PHOTO SNAP GALLERY RAIL -->
    <section class="gallery-wrapper">
        <div class="gold-tag" style="text-align: center; margin-bottom: 25px;">Captured Moments</div>
        
        <div class="gallery-rail">
            <!-- PHOTO 1 (Apna image src daalein) -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=11" alt="Image 1">
            </div>
            <!-- PHOTO 2 -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=12" alt="Image 2">
            </div>
            <!-- PHOTO 3 -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=13" alt="Image 3">
            </div>
            <!-- PHOTO 4 -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=14" alt="Image 4">
            </div>
            <!-- PHOTO 5 -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=15" alt="Image 5">
            </div>
            <!-- PHOTO 6 -->
            <div class="gallery-card">
                <img src="https://picsum.photos/600/900?random=16" alt="Image 6">
            </div>
        </div>
    </section>

    <!-- ENGINE SCRIPTS -->
    <script>
        // Gate Unlock & Music Play Logic
        function openInvitation() {
            const gate = document.getElementById('invifest-gate');
            gate.style.opacity = '0';
            setTimeout(() => {
                gate.style.display = 'none';
            }, 400);
            
            const audio = document.getElementById('bg-audio');
            audio.play().catch(e => console.log("Audio waiting for core click interaction bypass"));
        }

        // Original Smooth Fluid Canvas Scratch Setup
        const canvas = document.getElementById('scratch-canvas');
        const ctx = canvas.getContext('2d');
        let activeScratch = false;

        // Cover layer matching their elegant dark gray tone
        ctx.fillStyle = '#222226';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add premium text marker guide inside cover
        ctx.fillStyle = '#cfa851';
        ctx.font = '12px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('✨ SCRATCH CARD TO REVEAL ✨', canvas.width/2, canvas.height/2 + 4);

        function getTouchPos(e) {
            const bound = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return {
                x: clientX - bound.left,
                y: clientY - bound.top
            };
        }

        function startMove(e) { activeScratch = true; doMove(e); }
        function endMove() { activeScratch = false; }
        
        function doMove(e) {
            if (!activeScratch) return;
            e.preventDefault();
            const pos = getTouchPos(e);
            
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 20, 0, Math.PI * 2); // Perfect clear brush radius
            ctx.fill();
        }

        // Event hooks for both Android Touch and PC Mouse clicks
        canvas.addEventListener('touchstart', startMove);
        canvas.addEventListener('touchmove', doMove);
        canvas.addEventListener('touchend', endMove);
        canvas.addEventListener('mousedown', startMove);
        canvas.addEventListener('mousemove', doMove);
        canvas.addEventListener('mouseup', endMove);
    </script>
</body>
</html>
