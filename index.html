<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">

</head>

<body>

<!-- Flower Animation -->
<div class="petals"></div>

<!-- Envelope -->

<section class="envelope-section">

<div class="envelope" id="envelope">

<div class="flap"></div>

<div class="letter">

<h2>You're Invited</h2>

<p>Tap to Open</p>

</div>

</div>

</section>

<!-- Invitation -->

<section class="invite hidden" id="invite">

<div class="card">

<h3>With the Blessings of God</h3>

<h1>Bride Name</h1>

<span>&</span>

<h1>Groom Name</h1>

<p>01 July 2026</p>

</div>

</section>

<!-- Save Date -->

<section class="save-date">

<h2>Save The Date</h2>

<div class="scratch-card">

<div class="cover" id="cover">

SCRATCH

</div>

<div class="date">

01 July 2026

</div>

</div>

</section>

<!-- Story -->

<section class="story">

<h2>Our Story</h2>

<img src="images/story.jpg">

<p>

Write Your Story Here...

</p>

</section>

<!-- Gallery -->

<section class="gallery">

<h2>Gallery</h2>

<div class="grid">

<img src="images/img1.jpg">

<img src="images/img2.jpg">

<img src="images/img3.jpg">

<img src="images/img4.jpg">

</div>

</section>

<!-- RSVP -->

<section class="rsvp">

<h2>RSVP</h2>

<form>

<input type="text" placeholder="Your Name">

<input type="number" placeholder="Phone">

<select>

<option>Joyfully Accept</option>

<option>Regretfully Decline</option>

</select>

<textarea placeholder="Message"></textarea>

<button>Send RSVP</button>

</form>

</section>

<!-- Music -->

<button id="musicBtn">

🎵

</button>

<audio id="music" loop>

<source src="audio/music.mp3" type="audio/mpeg">

</audio>

<script src="script.js"></script>

</body>
</html>
