<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meenal & Avinash - Premium Royal Wedding</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Styling settings same as before, updated for animation */
    :root { --maroon: #824c4c; --bg-cream: #faf6f0; }
    body { background: var(--bg-cream); font-family: 'Playfair Display', serif; }

    /* Photo Slider Styles */
    .slider-container {
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      gap: 15px;
      padding: 20px;
      scrollbar-width: none;
    }
    .slide-item {
      flex: 0 0 80%;
      scroll-snap-align: center;
      background: white;
      padding: 10px;
      box-shadow: 0 10px 20px rgba(0,0,0,0.1);
    }

    /* Rose Petal Explosion Particle */
    .petal-particle {
      position: absolute;
      pointer-events: none;
      background: #ff758c;
      border-radius: 100% 0 100% 0;
      animation: explode 1s ease-out forwards;
    }
    @keyframes explode {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(0) translate(100px, 100px); opacity: 0; }
    }
  </style>
</head>
<body>

  <!-- PHOTO SLIDER (3-4 Items Sliding) -->
  <section class="mt-10">
    <h3 class="text-center font-bold text-2xl text-[#824c4c] mb-6">Our Memories</h3>
    <div class="slider-container">
      <div class="slide-item"><img src="https://picsum.photos/400/500?random=1" class="w-full h-64 object-cover"></div>
      <div class="slide-item"><img src="https://picsum.photos/400/500?random=2" class="w-full h-64 object-cover"></div>
      <div class="slide-item"><img src="https://picsum.photos/400/500?random=3" class="w-full h-64 object-cover"></div>
      <div class="slide-item"><img src="https://picsum.photos/400/500?random=4" class="w-full h-64 object-cover"></div>
    </div>
  </section>

  <!-- SCRATCH CARDS -->
  <div class="flex justify-center gap-4 mt-10">
    <!-- Example of one scratch card -->
    <div class="relative w-24 h-32 bg-white rounded-lg shadow-lg overflow-hidden">
        <div class="absolute inset-0 flex items-center justify-center font-bold text-[#824c4c]">JULY</div>
        <canvas id="scratch-month" width="96" height="128" class="absolute inset-0 z-10 cursor-pointer"></canvas>
    </div>
    <!-- (Repeat for Day and Year) -->
  </div>

  <script>
    function triggerRoseExplosion(x, y, canvas) {
      for(let i=0; i<8; i++) {
        const petal = document.createElement('div');
        petal.className = 'petal-particle';
        petal.style.left = x + 'px';
        petal.style.top = y + 'px';
        petal.style.width = '10px';
        petal.style.height = '10px';
        document.body.appendChild(petal);
        setTimeout(() => petal.remove(), 1000);
      }
    }

    function initScratch(id) {
        const canvas = document.getElementById(id);
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#bfa3a3'; // Scratch color
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        canvas.addEventListener('mousemove', (e) => {
            if(e.buttons === 1) {
                const rect = canvas.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                ctx.globalCompositeOperation = 'destination-out';
                ctx.beginPath();
                ctx.arc(x, y, 15, 0, Math.PI * 2);
                ctx.fill();

                // Trigger Rose Effect
                triggerRoseExplosion(e.clientX, e.clientY);
            }
        });
    }
    
    initScratch('scratch-month');
  </script>
</body>
</html>
